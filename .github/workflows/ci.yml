name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      # TODO: add `npm test` once app/_sites-preview/ is committed;
      # the test suite currently references files missing from the repository.
      - run: npm run build:pages
